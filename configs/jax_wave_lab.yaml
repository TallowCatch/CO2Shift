seed: 13
output_root: runs/jax_wave_lab

jax:
  enabled: true
  device: cpu
  dtype: float64
  grid_shape: [72, 88]
  num_steps: 96
  dt: 0.001
  dx: 10.0
  dz: 10.0
  source_frequency: 12.0
  source_index: [8, 44]
  receiver_depth: 12
  batch_size: 3
  velocity_range: [1.8, 2.5]
  snapshot_steps: [0, 24, 48, 72, 95]
  objective: wavefield_misfit
  target_perturbation_center: [0.16, 0.0]
  target_perturbation_sigma: [0.05, 0.14]
  target_perturbation_strength: 0.15
  gradient_check_epsilons: [0.1, 0.03, 0.01, 0.003, 0.001]
  min_gradient_l2_norm: 1.0e-14
  max_gradient_check_relative_error: 5.0e-2

hpc:
  launcher: local
  num_workers: 1
  threads_per_worker: 4
  job_name: jax-wave-lab

report:
  title: "CO2Shift JAX wave-propagation sidecar"
