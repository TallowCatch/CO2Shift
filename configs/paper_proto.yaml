seed: 11
output_root: runs/paper_proto

synthetic:
  num_train: 320
  num_val: 64
  num_test: 64
  num_ood: 64
  section_shape: [160, 128]
  geology_families:
    train: [0, 1, 2]
    test: [0, 1, 2]
    ood: [3, 4]
  mismatch_probability: 0.85
  clean_probability: 0.2
  plume_radius_range: [10, 20]
  noise_std_range: [0.01, 0.1]
  shift_trace_range: [-5, 5]
  wavelet_freq_range: [0.04, 0.12]
  amplitude_scale_range: [0.8, 1.25]
  drop_trace_fraction_range: [0.0, 0.15]

training:
  batch_size: 8
  epochs: 12
  learning_rate: 0.001
  weight_decay: 0.0001
  mc_dropout_passes: 16
  device: cpu

evaluation:
  abstain_quantiles: [0.7, 0.8, 0.9]
  threshold_quantile: 0.92
  save_figures: true

field:
  enabled: true
  mode: pseudo_sleipner
  path: ""

report:
  title: "Reliable 4D Change Maps for CCS Monitoring"
