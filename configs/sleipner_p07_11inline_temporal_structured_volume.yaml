seed: 11
output_root: runs/sleipner_p07_11inline_temporal_structured
artifacts_root: runs/paper_proto

training:
  device: cpu
  mc_dropout_passes: 8

field:
  enabled: true
  mode: manifest
  manifest_path: examples/sleipner_manifest.p07_11inline.json
  plume_support_note: "2010 plume-boundary support is used as a later-time structural envelope, not as exact ground truth for the earlier 2001/2004/2006 vintages. This 11-inline public benchmark uses inline-aligned support-volume proxies."
  postprocess:
    enabled: true
    threshold_mode: quantile
    probability_quantile: 0.92
    min_probability_threshold: 0.5
    uncertainty_quantile: 0.85
    shared_across_pairs: true
    shared_use_reservoir_region: true
    apply_reservoir_mask: true
    closing_iterations: 1
    opening_iterations: 1
    min_component_size: 400
    keep_largest_components: 3
  pseudo3d:
    enabled: true
    window_size: 3
    method: uncertainty_weighted_mean
    closing_iterations: 1
    opening_iterations: 0
    min_component_size: 900
    keep_largest_components: 3
  structured_support:
    enabled: true
    trace_window_size: 3
    trace_vote_fraction: 0.34
    vertical_sigma: 1.25
    column_relative_threshold: 0.45
    min_peak_probability: 0.5
    vertical_margin: 2
    closing_iterations: 0
    opening_iterations: 0
    min_component_size: 0
    keep_largest_components: 0
  temporal_structured_support:
    enabled: true
    trace_window_size: 3
    trace_vote_fraction: 0.34
    temporal_window_size: 3
    temporal_trace_vote_fraction: 0.34
    inline_window_size: 3
    inline_probability_weight: 0.2
    temporal_probability_weight: 0.35
    support_volume_weight: 0.08
    vertical_sigma: 1.0
    column_relative_threshold: 0.42
    min_peak_probability: 0.45
    vertical_margin: 2
    enforce_monotone_growth: true
    temporal_dilation: 1
    emergence_probability_threshold: 0.52
    hypervolume_closing_iterations: 0
    hypervolume_opening_iterations: 0
    hypervolume_min_component_size: 0
    hypervolume_keep_largest_components: 0
  layered_structured_support:
    enabled: true
    trace_window_size: 3
    trace_vote_fraction: 0.34
    num_bands: 5
    min_band_peak_probability: 0.5
    min_band_mean_probability: 0.18
    min_seed_fraction: 0.02
    neighbor_probability_weight: 0.3
    band_smoothing_iterations: 1
    closing_iterations: 1
    opening_iterations: 0
    min_component_size: 0
    keep_largest_components: 0

volume:
  enabled: true
  output_store: runs/sleipner_p07_11inline_temporal_structured/volume.zarr
  inline_order: [1835, 1836, 1837, 1838, 1839, 1840, 1841, 1842, 1843, 1844, 1845]
  vintage_order: [2001, 2004, 2006]
  chunking:
    inline: 1
    vintage: 1
    sample: 256
    trace: 128

hpc:
  launcher: local
  num_workers: 1
  threads_per_worker: 4
  job_name: sleipner-p07-temporal-structured

visualization:
  enabled: true
  mode: pyvista
  colormap: Viridis
  opacity: 0.18
  output_dir: runs/sleipner_p07_11inline_temporal_structured/results/visualization
  animation_variable: plain_ml_temporal_structured_constrained
  volume_variable: plain_ml_temporal_structured_constrained
  uncertainty_variable: uncertainty

report:
  title: "CO2Shift pseudo-3D Sleipner p07 temporal structured volume review"
