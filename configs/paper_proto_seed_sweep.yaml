seed: 11
output_root: runs/paper_proto_seed_sweep

synthetic:
  num_train: 192
  num_val: 48
  num_test: 48
  num_ood: 48
  section_shape: [160, 128]
  geology_families:
    train: [0, 1, 2]
    test: [0, 1, 2]
    ood: [3, 4]
  mismatch_probability: 0.85
  clean_probability: 0.2
  plume_radius_range: [10, 20]
  noise_std_range: [0.01, 0.1]
  shift_trace_range: [-5, 5]
  wavelet_freq_range: [0.04, 0.12]
  amplitude_scale_range: [0.8, 1.25]
  drop_trace_fraction_range: [0.0, 0.15]

training:
  batch_size: 8
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  mc_dropout_passes: 8
  device: cpu
  use_hybrid_augmentation: true
  use_reservoir_weighting: true
  outside_reservoir_weight: 0.35

evaluation:
  abstain_quantiles: [0.7, 0.8, 0.9]
  threshold_quantile: 0.92
  save_figures: false

field:
  enabled: false

seed_sweep:
  enabled: true
  dataset_root: runs/paper_proto
  output_root: runs/paper_proto_seed_sweep
  seeds: [11, 12, 13]
  methods: [plain_ml, hybrid_ml]
  splits: [test, ood]
  metrics: [dice, iou, false_positive_rate, ece, brier, nll, risk_coverage_auc]
  reuse_existing_dataset: true
  save_individual_figures: false

report:
  title: "CO2Shift synthetic seed sweep"
