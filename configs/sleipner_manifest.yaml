seed: 11
output_root: runs/sleipner_manifest

field:
  enabled: true
  mode: manifest
  path: ""
  manifest_path: examples/sleipner_manifest.real.json
  benchmark_root: /tmp/sleipner_benchmark_restore/velocities_trends_surfaces/data
  plume_boundaries_root: /tmp/sleipner_benchmark_restore/Sleipner_Plumes_Boundaries/data
  segy_path: examples/exports/raw/94p07mid.sgy
  export_segy_path: examples/exports/raw/04p07mid.sgy
  export_output_path: examples/exports/sleipner_2004_monitor.npy
  export_normalization_segy_paths:
    - examples/exports/raw/94p07mid.sgy
    - examples/exports/raw/06p07mid.sgy
  inline_number: 1840
  output_mask_path: examples/exports/sleipner_storage_interval_mask.npy
  output_plume_support_path: examples/exports/sleipner_2010_plume_support_traces.npy
  output_support_volume_path: examples/exports/sleipner_2010_support_volume_inline_1840_p07.npy
  plume_support_path: ""
  plume_support_note: "2010 plume-boundary support is used as a later-time structural envelope, not as exact ground truth for the earlier 2001/2004/2006 vintages. The multi-inline manifest uses inline-specific support-volume proxies."
  postprocess:
    enabled: true
    threshold_mode: quantile
    probability_quantile: 0.92
    min_probability_threshold: 0.5
    uncertainty_quantile: 0.85
    shared_across_pairs: true
    shared_use_reservoir_region: true
    apply_reservoir_mask: true
    closing_iterations: 1
    opening_iterations: 1
    min_component_size: 400
    keep_largest_components: 3

evaluation:
  save_figures: true

report:
  title: "CO2Shift real Sleipner field evaluation"
